name: Publish Godot Web Templates

on:
  workflow_dispatch:
    inputs:
      template_tag:
        description: Release tag for the custom template artifact
        required: true
        default: godot-web-template-4.5-stable-pentris-v1
      godot_ref:
        description: Godot git ref to build from
        required: true
        default: 4.5-stable
      godot_version_dir:
        description: Godot export template version directory
        required: true
        default: 4.5.stable

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PENTRIS_TEMPLATE_TAG: ${{ inputs.template_tag }}
      GODOT_REF: ${{ inputs.godot_ref }}
      GODOT_VERSION_DIR: ${{ inputs.godot_version_dir }}
      PENTRIS_TEMPLATE_ASSET_BASENAME: pentris-godot-web-templates-${{ inputs.template_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y scons

      - name: Install Emscripten SDK
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          cd /tmp/emsdk
          ./emsdk install 4.0.10
          ./emsdk activate 4.0.10
          echo "EMSDK=/tmp/emsdk" >> "$GITHUB_ENV"
          echo "EM_CONFIG=/tmp/emsdk/.emscripten" >> "$GITHUB_ENV"
          echo "/tmp/emsdk" >> "$GITHUB_PATH"
          echo "/tmp/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Build custom web templates
        shell: bash
        run: |
          source /tmp/emsdk/emsdk_env.sh
          ./scripts/build_custom_web_templates.sh

      - name: Upload template artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-templates
          path: output/custom-web-templates/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ inputs.template_tag }}" >/dev/null 2>&1; then
            gh release upload "${{ inputs.template_tag }}" output/custom-web-templates/* --clobber
          else
            gh release create "${{ inputs.template_tag }}" output/custom-web-templates/* --title "${{ inputs.template_tag }}" --notes "Custom reduced-size Godot Web export templates for Pentris."
          fi
